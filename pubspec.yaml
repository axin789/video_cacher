name: video_cacher
description: Offline video cache for Flutter - mp4/HLS(m3u8) download with resume, AES-128, pure-Dart remux to mp4, album export. 离线视频缓存：断点续传、纯 Dart 转封装、相册保存。
version: 0.1.1
homepage: https://github.com/doubledog789/video_cacher
repository: https://github.com/doubledog789/video_cacher
issue_tracker: https://github.com/doubledog789/video_cacher/issues
topics:
  - video
  - download
  - m3u8
  - hls
  - offline

# 相册保存依赖 photo_manager，仅这三端可用；无 web/windows/linux 支持。
platforms:
  android:
  ios:
  macos:

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.0
  meta: ^1.15.0
  path: ^1.9.0
  path_provider: ^2.1.5
  photo_manager: ^3.0.0
  pointycastle: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # 测试里替换 PathProviderPlatform.instance，免 mock 平台通道。
  path_provider_platform_interface: ^2.1.0
