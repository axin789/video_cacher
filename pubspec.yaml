name: video_cacher
description: Offline video cache for Flutter - mp4/HLS(m3u8) download with resume, AES-128, pure-Dart remux to mp4, album export. 离线视频缓存：断点续传、纯 Dart 转封装、相册保存。
version: 0.2.1
homepage: https://github.com/doubledog789/video_cacher
repository: https://github.com/doubledog789/video_cacher
issue_tracker: https://github.com/doubledog789/video_cacher/issues
topics:
  - video
  - download
  - m3u8
  - hls
  - offline

# 平台清单由下方 flutter.plugin.platforms 推导（android/ios）。macOS 上没有
# 原生实现：插件不注册，AES 自动落纯 Dart 兜底，其余功能仍是纯 Dart。
environment:
  sdk: '>=3.6.0 <4.0.0'
  # BackgroundIsolateBinaryMessenger（背景 isolate 用平台通道）自 3.7 起提供。
  flutter: '>=3.7.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.0
  meta: ^1.15.0
  path: ^1.9.0
  path_provider: ^2.1.5
  photo_manager: ^3.0.0
  pointycastle: ">=3.7.3 <5.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # 测试里替换 PathProviderPlatform.instance，免 mock 平台通道。
  path_provider_platform_interface: ^2.1.0

# 唯一的原生代码：把 HLS 的 AES-128-CBC 解密转交系统加密库（硬件 AES 指令）。
# 不捆绑任何二进制，仅调用 OS API；平台缺失时自动退回纯 Dart。
flutter:
  plugin:
    platforms:
      android:
        package: com.videocacher.video_cacher
        pluginClass: VideoCacherPlugin
      ios:
        pluginClass: VideoCacherPlugin
