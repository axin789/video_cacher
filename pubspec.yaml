name: ffmpeg_remux
description: 用于离线视频缓存的 Flutter 插件，支持 mp4/m3u8 下载、HLS 转 mp4、地址刷新与相册复制。
version: 0.0.5
homepage: https://github.com/axin789/ffmpeg_remux
repository: https://github.com/axin789/ffmpeg_remux
issue_tracker: https://github.com/axin789/ffmpeg_remux/issues
topics:
  - video
  - download
  - m3u8
  - ffmpeg
  - offline

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.0.0
  plugin_platform_interface: ^2.0.2
  dio: ^5.9.0
  path: ^1.9.0
  path_provider: ^2.1.5
  photo_manager: ^3.0.0
  pointycastle: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0


flutter:
  plugin:
    platforms:
      android:
        package: com.media.ffmpeg_remux
        pluginClass: FfmpegRemuxPlugin
      ios:
        pluginClass: FfmpegRemuxPlugin
      macos:
        pluginClass: FfmpegRemuxPlugin
      web:
        pluginClass: FfmpegRemuxWeb
        fileName: ffmpeg_remux_web.dart
